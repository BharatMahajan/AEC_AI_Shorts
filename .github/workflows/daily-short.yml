name: daily-short

# Runs exactly at 09:00 and 21:00 IST (03:30 and 15:30 UTC).
# Manual dispatch is always allowed.
on:
  schedule:
    - cron: "30 3,15 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore the slot gate and publish anyway"
        type: boolean
        default: false

concurrency:
  group: daily-short
  cancel-in-progress: false

permissions:
  contents: write   # to commit the updated history back

env:
  TZ: Asia/Kolkata

jobs:
  # ---- Gate: allow at most one successful publish per slot --------------- #
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      slot_key: ${{ steps.decide.outputs.slot_key }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 50

      - id: decide
        shell: bash
        run: |
          HOUR="$(date +%H)"
          if [ "$HOUR" = "09" ]; then
            SLOT_SUFFIX="am"
          elif [ "$HOUR" = "21" ]; then
            SLOT_SUFFIX="pm"
          else
            SLOT_SUFFIX="manual"
          fi
          SLOT_KEY="$(date +%Y-%m-%d)-$SLOT_SUFFIX"
          echo "slot_key=$SLOT_KEY" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # On scheduled runs, only permit the two IST publishing windows.
          if [ "$SLOT_SUFFIX" = "manual" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # De-dupe reruns by checking whether this slot was already committed.
          if git log --oneline --grep "record published short for $SLOT_KEY" -n 1 | grep -q .; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # ---- Tests must pass before anything is published --------------------- #
  test:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: ruff check pipeline tests
      - run: mypy pipeline
      - run: pytest --cov=pipeline --cov-fail-under=98

  # ---- Publish: build the Short and commit history back ----------------- #
  publish:
    needs: [gate, test]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache Remotion deps + browser
        uses: actions/cache@v5
        with:
          path: |
            remotion/node_modules
            ~/.remotion
            ~/.cache/remotion
          key: remotion-${{ hashFiles('remotion/package.json') }}

      - name: Install deps
        run: |
          pip install -r requirements.txt
          cd remotion && npm install
      - name: Ensure Remotion browser
        run: cd remotion && npx remotion browser ensure

      - name: Validate required secrets
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          missing=0
          for name in GEMINI_API_KEY YT_CLIENT_ID YT_CLIENT_SECRET YT_REFRESH_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run pipeline (all stages)
        env:
          SLOT_KEY: ${{ needs.gate.outputs.slot_key }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_DATA_API_KEY: ${{ secrets.YT_DATA_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENABLE_ANALYTICS: ${{ vars.ENABLE_ANALYTICS }}
          REVIEW_BEFORE_PUBLISH: ${{ vars.REVIEW_BEFORE_PUBLISH }}
          REMOTION_CONCURRENCY: ${{ vars.REMOTION_CONCURRENCY }}
          REMOTION_SCALE: ${{ vars.REMOTION_SCALE }}
        run: python -m pipeline.run all

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: run-report-${{ needs.gate.outputs.slot_key }}
          path: build/run-report.json

      - name: Commit history
        run: |
          git config user.name "aec-shorts-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/scripts_created.json
          git diff --cached --quiet || git commit -m "chore: record published short for ${{ needs.gate.outputs.slot_key }}"
          git push
